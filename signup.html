<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenFare | Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="Picture2.png">

    <script src="https://animatedicons.co/scripts/embed-animated-icons.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 120%, #2a220d 0%, #0c0c0d 70%);
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        #hexCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- ENTRY ANIMATIONS --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* The card stays hidden until the .animate class is added */
        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 960px;
            background: linear-gradient(135deg, #161618 0%, #0c0c0d 100%);
            border-radius: 4px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            opacity: 0;
        }

        .login-card.animate {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-item {
            opacity: 0;
        }

        /* Trigger entry animations only when the parent card has the .animate class */
        .login-card.animate .left-panel .card-header.animate-item     { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.1s; }
        .login-card.animate .left-panel .welcome-text.animate-item    { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.2s; }
        .login-card.animate .left-panel .signup-redirect.animate-item { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.25s; }
        .login-card.animate .left-panel .form-group:nth-child(1)      { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.3s; }
        .login-card.animate .left-panel .form-group:nth-child(2)      { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.35s; }
        .login-card.animate .left-panel .form-group:nth-child(3)      { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.4s; }
        .login-card.animate .left-panel .form-utils.animate-item      { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.45s; }
        .login-card.animate .left-panel .btn-submit.animate-item      { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.5s; }

        .login-card.animate .avatar-container {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: 0.4s;
        }

        .login-card.animate .social-sidebar .social-icon {
            animation: fadeInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .login-card.animate .social-sidebar .social-icon:nth-child(1) { animation-delay: 0.5s; }
        .login-card.animate .social-sidebar .social-icon:nth-child(2) { animation-delay: 0.55s; }
        .login-card.animate .social-sidebar .social-icon:nth-child(3) { animation-delay: 0.6s; }
        .login-card.animate .social-sidebar .social-icon:nth-child(4) { animation-delay: 0.65s; }
        .login-card.animate .social-sidebar .social-icon:nth-child(5) { animation-delay: 0.7s; }

        .left-panel {
            padding: 45px 60px 60px 60px;
            position: relative;
            background: radial-gradient(circle at -5% 25%, rgba(255, 198, 38, 0.12) 0%, rgba(0, 0, 0, 0) 55%);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .logo {
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .logo span {
            color: #FFC626;
        }

        .welcome-text {
            color: #FFC626;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .signup-redirect {
            color: #8e8e93;
            font-size: 13px;
            margin-bottom: 35px;
        }

        .signup-redirect a {
            color: #FFC626;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-control {
            width: 100%;
            background-color: transparent;
            border: 1px solid #3a3a3c;
            border-radius: 10px;
            padding: 14px 24px;
            color: #FFC626; 
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-control::placeholder {
            color: #48484a;
        }

        .form-control:focus {
            border-color: #FFC626;
        }

        .password-toggle {
            position: absolute;
            right: 20px;
            color: #636366;
            cursor: pointer;
            font-size: 16px;
        }

        .form-utils {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 35px;
            font-size: 12px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #8e8e93;
            cursor: pointer;
            user-select: none;
        }

        .remember-me input {
            display: none;
        }

        .custom-checkbox {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid #FFC626;
            margin-right: 8px;
            display: inline-block;
            position: relative;
        }

        .remember-me input:checked+.custom-checkbox {
            background-color: #FFC626;
        }

        .forgot-password {
            color: #FFC626;
            text-decoration: none;
        }

        .btn-submit {
            width: 100%;
            background-color: #cc991a;
            border: 1px solid #FFC626;
            color: #000000;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
        }

        /* Enhanced bright feedback on hover */
        .btn-submit:hover {
            background-color: #FFC626;
            box-shadow: 0 0 15px rgba(255, 198, 38, 0.4);
        }

        /* Explicitly breaks the keyframe lock to handle the press down action */
        .login-card.animate .left-panel .btn-submit:active {
            transform: scale(0.97) !important;
        }

        .right-panel {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-right: 40px;
        }

        .avatar-container {
            width: 290px;
            height: 290px;
            background-color: #FFC626;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: rotateY(180deg);
        }

        .social-sidebar {
            position: absolute;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-icon {
            width: 26px;
            height: 26px;
            background-color: #FFC626;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0c0c0d;
            text-decoration: none;
            font-size: 0.9rem;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        /* Fixed: Targets the icon font tag inside to dodge entry animation layout overrides */
        .social-icon i {
            transition: transform 0.4s ease;
        }

        .social-icon:hover i {
            transform: rotateZ(360deg);
        }

        .social-icon:hover {
            background-color: #ffffff;
            transform: scale(1.15);
        }

        /* View State Logic Classes */
        .view-content {
            display: none;
        }

        .view-content.active {
            display: block;
        }

        /* --- PAGE LOADER OVERLAY STYLE --- */
        #pageLoader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0c0c0d;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            opacity: 1;
            visibility: visible;
            gap: 0px;
        }

        #pageLoader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* Fixed color filter: Converts the dark graphic elements into fine golden-amber #FFC626 */
        #pageLoader dotlottie-wc {
            position: relative;
            z-index: 10000;
            filter: invert(83%) sepia(52%) saturate(1450%) hue-rotate(326deg) brightness(102%) contrast(101%);
        }

        /* Styling for the new text under animation */
        .loader-text {
            color: #fbb33f;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: -80px;
            margin-left: 20px;
            text-transform: uppercase;
            z-index: 10000;
        }

        @media (max-width: 850px) {
            .login-card {
                grid-template-columns: 1fr;
                max-width: 480px;
            }

            .right-panel {
                padding: 40px 0;
                order: -1;
                background: radial-gradient(circle at 50% 50%, rgba(255, 198, 38, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            }

            .social-sidebar {
                flex-direction: row;
                right: auto;
                bottom: 15px;
            }

            .left-panel {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>

    <canvas id="hexCanvas"></canvas>

    <div class="login-card" id="mainCard">
        <div class="left-panel">
            <header class="card-header animate-item">
                <div class="logo"><span>.</span>OpenFare<span>.</span></div>
            </header>

            <div id="loginView" class="view-content active">
                <main>
                    <h1 class="welcome-text animate-item">Welcome Back!</h1>
                    <p class="signup-redirect animate-item">Don't have an account? <a onclick="switchView('signupView')">Sign up</a></p>

                    <form id="loginForm">
                        <div class="form-group animate-item">
                            <label for="username">Username</label>
                            <div class="input-wrapper">
                                <input type="email" id="username" class="form-control" placeholder="example@gmail.com" required>
                            </div>
                        </div>

                        <div class="form-group animate-item">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                                <i class="fa-regular fa-eye-slash password-toggle toggle-password-btn"></i>
                            </div>
                        </div>

                        <div class="form-utils animate-item">
                            <label class="remember-me">
                                <input type="checkbox" checked>
                                <span class="custom-checkbox"></span>
                                Remember me
                            </label>
                            <a href="#" class="forgot-password">Forget password?</a>
                        </div>

                        <button type="submit" class="btn-submit animate-item">Sign In</button>
                    </form>
                </main>
            </div>

            <div id="signupView" class="view-content">
                <main>
                    <h1 class="welcome-text animate-item">Create Account</h1>
                    <p class="signup-redirect animate-item">Already have an account? <a onclick="switchView('loginView')">Sign in</a></p>

                    <form id="signupForm">
                        <div class="form-group animate-item">
                            <label for="fullname">Full Name</label>
                            <div class="input-wrapper">
                                <input type="text" id="fullname" class="form-control" placeholder="John Doe" required>
                            </div>
                        </div>

                        <div class="form-group animate-item">
                            <label for="email">Email Address</label>
                            <div class="input-wrapper">
                                <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
                            </div>
                        </div>

                        <div class="form-group animate-item">
                            <label for="signupPassword">Password</label>
                            <div class="input-wrapper">
                                <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" required>
                                <i class="fa-regular fa-eye-slash password-toggle toggle-password-btn"></i>
                            </div>
                        </div>

                        <div class="form-utils animate-item">
                            <label class="remember-me">
                                <input type="checkbox" required>
                                <span class="custom-checkbox"></span>
                                I agree to the Terms & Conditions
                            </label>
                        </div>

                        <button type="submit" class="btn-submit animate-item">Sign Up</button>
                    </form>
                </main>
            </div>
        </div>

        <div class="right-panel">
            <div class="avatar-container">
                <img src="image.jpg" alt="Yellow Sports Car">
            </div>

            <div class="social-sidebar">
                <a href="#" class="social-icon"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" class="social-icon"><i class="fa-brands fa-discord"></i></a>
                <a href="#" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="social-icon"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="social-icon"><i class="fa-brands fa-tiktok"></i></a>
            </div>
        </div>
    </div>

    <div id="pageLoader">
        <dotlottie-wc src="https://lottie.host/4b1dc2e8-6a29-48ac-8660-35d6ce40c425/HnPZ1FxcU2.lottie"
            style="width: 300px; height: 300px;" autoplay loop playMode="bounce"></dotlottie-wc>
        <div class="loader-text">Excellence Takes a Moment...</div>
    </div>

    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>
    
    <script>
        // --- HEXAGON CANVAS BACKGROUND ---
        const canvas = document.getElementById('hexCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initHexagons();
        });

        const hexRadius = 30;
        const hexHeight = hexRadius * Math.sqrt(3);
        const hexWidth = hexRadius * 2;
        const xSpacing = hexRadius * 1.5;
        const ySpacing = hexHeight;

        let hexagons = [];
        let mouseX = width / 2;
        let mouseY = height / 2;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        class Hexagon {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseOpacity = 0.06;
                this.opacity = this.baseOpacity;
                this.targetOpacity = this.baseOpacity;
            }

            draw(context) {
                const drawContext = context || ctx;
                drawContext.sidebarOpen = true;
                drawContext.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 3) * i;
                    const xCoord = this.x + hexRadius * Math.cos(angle);
                    const yCoord = this.y + hexRadius * Math.sin(angle);
                    if (i === 0) drawContext.moveTo(xCoord, yCoord);
                    else drawContext.lineTo(xCoord, yCoord);
                }
                drawContext.closePath();
                drawContext.strokeStyle = `rgba(255, 198, 38, ${this.opacity})`;
                drawContext.lineWidth = 1.2;
                drawContext.stroke();
            }

            update() {
                this.opacity += (this.targetOpacity - this.opacity) * 0.1;
            }
        }

        function initHexagons() {
            hexagons = [];
            const cols = Math.ceil(width / xSpacing) + 1;
            const rows = Math.ceil(height / ySpacing) + 1;

            for (let c = 0; c < cols; c++) {
                for (let r = 0; r < rows; r++) {
                    let x = c * xSpacing;
                    let rY = r * ySpacing;
                    if (c % 2 === 1) rY += ySpacing / 2;
                    hexagons.push(new Hexagon(x, rY));
                }
            }
        }

        const maxDistance = 250; 
        function animate() {
            ctx.clearRect(0, 0, width, height);
            hexagons.forEach(hex => {
                const dx = hex.x - mouseX;
                const dy = hex.y - mouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < maxDistance) {
                    const intensity = 1 - (distance / maxDistance);
                    hex.targetOpacity = hex.baseOpacity + intensity * 0.35;
                } else {
                    hex.targetOpacity = hex.baseOpacity;
                }
                hex.update();
                hex.draw();
            });
            requestAnimationFrame(animate);
        }

        initHexagons();
        animate();

        // --- PASSWORD SHOW/HIDE TOGGLE ---
        document.querySelectorAll('.toggle-password-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const inputField = this.previousElementSibling;
                const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                inputField.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });

        // --- SEAMLESS VIEW TRANSITION SYSTEM ---
        const loader = document.getElementById('pageLoader');
        const mainCard = document.getElementById('mainCard');

        // Changed timer from 5 seconds to 2 seconds for snappier entry feel
        window.addEventListener('load', () => {
            setTimeout(() => {
                loader.classList.add('hidden');
                mainCard.classList.add('animate');
            }, 2000); 
        });

        function switchView(viewId) {
            mainCard.classList.remove('animate');
            loader.classList.remove('hidden');

            setTimeout(() => {
                document.querySelectorAll('.view-content').forEach(view => {
                    view.classList.remove('active');
                });
                
                const targetView = document.getElementById(viewId);
                targetView.classList.add('active');
            }, 600); 

            setTimeout(() => {
                loader.classList.add('hidden');
                mainCard.classList.add('animate');
            }, 2000);
        }

        // --- AUTHENTICATION ROUTING REDIRECTS ---
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            window.location.href = 'index.html';
        });

        document.getElementById('signupForm').addEventListener('submit', function(event) {
            event.preventDefault();
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
